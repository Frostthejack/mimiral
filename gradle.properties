org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# R8 / DEX optimization for startup ANR fix
# Enable R8 full mode for all build types — more aggressive inlining,
# class merging, and unboxing to reduce DEX method count.
android.enableR8.fullMode=true

# Enable DEX layout optimization — reorders DEX sections to improve
# page-in efficiency during verification on emulator cold start.
android.enableDexingArtifactTransform.desugaring=true
